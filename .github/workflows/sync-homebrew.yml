name: Sync Homebrew Formula

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  sync-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Fetch formula from homebrew-core
        id: fetch
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/Homebrew/homebrew-core/master/Formula/o/oh-my-agent.rb" \
            -o /tmp/oh-my-agent.rb

      - name: Check for changes
        id: diff
        run: |
          if diff -q cli/oh-my-agent.rb /tmp/oh-my-agent.rb > /dev/null 2>&1; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            cp /tmp/oh-my-agent.rb cli/oh-my-agent.rb
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated formula
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cli/oh-my-agent.rb
          git commit -m "chore: sync homebrew formula from homebrew-core [skip ci]"
          git push
