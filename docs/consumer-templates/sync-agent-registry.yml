# Consumer Workflow: Sync Agent Registry
# Copy this file to your project: .github/workflows/sync-agent-registry.yml
#
# This workflow syncs the .agents/ directory from the central registry
# when .agent-registry.yml version changes.

name: Sync Agent Registry

on:
  push:
    branches: [main]
    paths:
      - '.agent-registry.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to sync (leave empty to use .agent-registry.yml)'
        required: false
        default: ''

permissions:
  contents: write

env:
  REGISTRY_REPO: first-fluke/oh-my-ag

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version from config
        id: config
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          elif [ -f ".agent-registry.yml" ]; then
            VERSION=$(grep -E '^version:' .agent-registry.yml | sed 's/version:[[:space:]]*"\?\([^"]*\)"\?/\1/')
          else
            echo "Error: No version specified and .agent-registry.yml not found"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=cli-v$VERSION" >> $GITHUB_OUTPUT
          echo "Syncing version: $VERSION"

      - name: Download release artifacts
        env:
          RELEASE_TAG: ${{ steps.config.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Downloading artifacts for $RELEASE_TAG..."
          gh release download "$RELEASE_TAG" \
            --repo "$REGISTRY_REPO" \
            --pattern "agent-skills.tar.gz" \
            --pattern "agent-skills.tar.gz.sha256" \
            --pattern "prompt-manifest.json" \
            --dir /tmp/agent-registry

      - name: Verify checksum
        run: |
          echo "Verifying SHA256 checksum..."
          cd /tmp/agent-registry
          sha256sum -c agent-skills.tar.gz.sha256
          echo "Checksum verified successfully"

      - name: Backup and extract
        id: sync
        env:
          CONFIG_VERSION: ${{ steps.config.outputs.version }}
        run: |
          echo "Extracting to workspace..."

          if [ -d ".agent" ]; then
            echo "Backing up existing .agent directory..."
            mv ".agent" ".agent.backup.$(date +%Y%m%d%H%M%S)"
          fi

          tar -xzvf /tmp/agent-registry/agent-skills.tar.gz

          FILES_COUNT=$(find ".agent" -type f | wc -l | tr -d ' ')
          echo "files_synced=$FILES_COUNT" >> $GITHUB_OUTPUT
          echo "Synced $FILES_COUNT files (version $CONFIG_VERSION)"

      - name: Preserve local config
        run: |
          if [ -f ".agent-registry.yml" ]; then
            PRESERVE=$(grep -A 100 'preserve:' .agent-registry.yml | grep -E '^\s+-' | sed 's/.*- "\?\([^"]*\)"\?/\1/' || true)

            for pattern in $PRESERVE; do
              BACKUP_FILE=".agent.backup.*/${pattern}"
              if ls $BACKUP_FILE 1> /dev/null 2>&1; then
                echo "Restoring preserved file: $pattern"
                mkdir -p "$(dirname "$pattern")"
                cp -f $BACKUP_FILE "$pattern" 2>/dev/null || true
              fi
            done
          fi

      - name: Commit synced files
        env:
          CONFIG_VERSION: ${{ steps.config.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet .agents/; then
            echo "No changes to commit"
            exit 0
          fi

          git add .agents/
          git commit -m "chore: sync agent-registry v${CONFIG_VERSION}"
          git push
          echo "Committed synced files for version $CONFIG_VERSION"

      - name: Cleanup
        run: |
          rm -rf /tmp/agent-registry
          find . -maxdepth 1 -type d -name ".agent.backup.*" -mtime +7 -exec rm -rf {} + 2>/dev/null || true
          echo "Cleanup complete"
